<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原神クイズ - Genshin Impact Quiz</title>
  <meta name="description" content="原神の知識を試す4択クイズゲーム。キャラクター、元素、ストーリーなど幅広い問題に挑戦しよう！">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #e2b44d;
      --gold-light: #f5d88e;
      --gold-dark: #b8872e;
      --bg-deep: #0a0e1a;
      --bg-card: rgba(15, 22, 42, 0.85);
      --bg-card-hover: rgba(25, 35, 65, 0.9);
      --accent-anemo: #74c2a8;
      --accent-pyro: #ef7938;
      --accent-hydro: #4cc2f1;
      --accent-electro: #b08fc2;
      --accent-dendro: #a5c83b;
      --accent-cryo: #9dd5e5;
      --accent-geo: #f2b723;
      --text-primary: #eae4d9;
      --text-secondary: #9a9489;
      --correct: #4ade80;
      --wrong: #f87171;
      --border-glow: rgba(226, 180, 77, 0.3);
      --font: 'Noto Sans JP', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(116, 194, 168, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(176, 143, 194, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(226, 180, 77, 0.06) 0%, transparent 50%);
      z-index: 0;
      animation: bgShift 20s ease-in-out infinite alternate;
    }

    @keyframes bgShift { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    .particles { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute; width: 3px; height: 3px; background: var(--gold);
      border-radius: 50%; opacity: 0; animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.6; } 90% { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .container {
      position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 12px 20px;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    /* ===== SCREEN FLASH OVERLAY ===== */
    .screen-flash {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 99; opacity: 0;
      transition: opacity 0.15s ease-out;
    }
    .screen-flash.correct-flash {
      box-shadow: inset 0 0 80px 20px rgba(74, 222, 128, 0.4);
      border: 3px solid rgba(74, 222, 128, 0.6);
      opacity: 1;
    }
    .screen-flash.wrong-flash {
      box-shadow: inset 0 0 80px 20px rgba(248, 113, 113, 0.4);
      border: 3px solid rgba(248, 113, 113, 0.6);
      opacity: 1;
    }

    /* ===== START SCREEN ===== */
    #start-screen { text-align: center; animation: fadeInUp 0.8s ease-out; width: 100%; }

    .logo-icon { width: 60px; height: 60px; margin: 0 auto 10px; }
    .logo-icon::before {
      content: '✦'; font-size: 48px; color: var(--gold);
      text-shadow: 0 0 30px rgba(226, 180, 77, 0.5); animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }

    .logo-title {
      font-size: 32px; font-weight: 900;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 4px; margin-bottom: 4px;
    }
    .logo-subtitle { font-size: 12px; color: var(--text-secondary); letter-spacing: 6px; text-transform: uppercase; }

    .settings-section { margin: 14px 0 6px; }
    .section-label {
      font-size: 11px; color: var(--text-secondary); letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 8px;
    }

    /* Difficulty */
    .difficulty-options { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .diff-btn {
      padding: 7px 20px; border: 1px solid var(--border-glow); background: var(--bg-card);
      color: var(--text-primary); border-radius: 8px; font-family: var(--font);
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .diff-btn:hover { background: var(--bg-card-hover); border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(226, 180, 77, 0.2); }
    .diff-btn.active {
      background: linear-gradient(135deg, rgba(226, 180, 77, 0.2), rgba(226, 180, 77, 0.1));
      border-color: var(--gold); color: var(--gold-light); box-shadow: 0 0 20px rgba(226, 180, 77, 0.15);
    }

    /* Genre chips */
    .genre-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .genre-chip {
      padding: 6px 14px; border: 1px solid rgba(255,255,255,0.08); background: var(--bg-card);
      color: var(--text-secondary); border-radius: 24px; font-family: var(--font);
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.3s ease;
      backdrop-filter: blur(10px); display: flex; align-items: center; gap: 5px;
      user-select: none;
    }
    .genre-chip:hover { background: var(--bg-card-hover); border-color: rgba(226, 180, 77, 0.3); }
    .genre-chip.active {
      background: linear-gradient(135deg, rgba(226, 180, 77, 0.15), rgba(226, 180, 77, 0.08));
      border-color: var(--gold); color: var(--gold-light);
    }
    .genre-chip .chip-count {
      font-size: 11px; background: rgba(255,255,255,0.06); padding: 2px 7px;
      border-radius: 10px; margin-left: 2px;
    }
    .genre-chip.active .chip-count { background: rgba(226, 180, 77, 0.2); }

    /* Question count */
    .count-options { display: flex; gap: 10px; justify-content: center; }
    .count-btn {
      padding: 6px 18px; height: 34px; border: 1px solid rgba(255,255,255,0.08); background: var(--bg-card);
      color: var(--text-secondary); border-radius: 8px; font-family: var(--font);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
    }
    .count-btn:hover { border-color: var(--gold); color: var(--text-primary); }
    .count-btn.active {
      background: linear-gradient(135deg, rgba(226, 180, 77, 0.2), rgba(226, 180, 77, 0.1));
      border-color: var(--gold); color: var(--gold-light);
    }

    .available-count {
      font-size: 12px; color: var(--text-secondary); margin-top: 6px;
    }
    .available-count span { color: var(--gold); font-weight: 700; }

    .start-btn {
      margin-top: 18px; padding: 12px 50px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: var(--bg-deep); border: none; border-radius: 50px; font-family: var(--font);
      font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 4px;
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .start-btn::after {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: rotate(45deg); animation: shimmer 3s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }
    .start-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(226, 180, 77, 0.4); }
    .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ===== QUIZ SCREEN ===== */
    #quiz-screen { width: 100%; display: none; }

    .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding: 0 2px; }
    .quiz-header-left { display: flex; align-items: center; gap: 12px; }
    .question-counter { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .question-counter span { color: var(--gold); font-weight: 700; font-size: 15px; }
    .quiz-tally { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; }
    .tally-correct { color: var(--correct); }
    .tally-wrong { color: var(--wrong); }
    .quit-btn {
      background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--text-secondary);
      font-family: var(--font); font-size: 11px; padding: 3px 10px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s ease; letter-spacing: 1px;
    }
    .quit-btn:hover { border-color: var(--wrong); color: var(--wrong); }

    .progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-bottom: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light)); border-radius: 2px; transition: width 0.5s ease; box-shadow: 0 0 10px rgba(226, 180, 77, 0.3); }

    .question-card {
      background: var(--bg-card); border: 1px solid rgba(226, 180, 77, 0.1);
      border-radius: 10px; padding: 10px 16px; margin-bottom: 8px;
      backdrop-filter: blur(20px); position: relative; overflow: hidden; animation: fadeInUp 0.4s ease-out;
    }
    .question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

    .question-meta {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .question-category {
      display: inline-block; font-size: 9px; color: var(--text-secondary); letter-spacing: 1px;
      padding: 2px 7px;
      background: rgba(255,255,255,0.04); border-radius: 10px; font-weight: 500;
    }
    .question-difficulty-badge {
      display: inline-block; font-size: 9px; letter-spacing: 1px;
      padding: 2px 7px; border-radius: 10px; font-weight: 600;
    }
    .badge-easy { color: var(--accent-anemo); background: rgba(116, 194, 168, 0.1); }
    .badge-normal { color: var(--accent-hydro); background: rgba(76, 194, 241, 0.1); }
    .badge-hard { color: var(--accent-pyro); background: rgba(239, 121, 56, 0.1); }
    .badge-extreme { color: var(--accent-electro); background: rgba(176, 143, 194, 0.12); }

    .question-text { font-size: 16px; font-weight: 700; line-height: 1.45; color: var(--text-primary); }

    .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .option-btn {
      width: 100%; padding: 10px 12px; background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
      color: var(--text-primary); font-family: var(--font); font-size: 13px; font-weight: 500;
      text-align: left; cursor: pointer; transition: all 0.2s ease; backdrop-filter: blur(10px);
      display: flex; align-items: flex-start; gap: 8px;
    }
    .option-btn:hover:not(.disabled) {
      background: var(--bg-card-hover); border-color: rgba(226, 180, 77, 0.3);
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .option-label {
      width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
      border-radius: 5px; background: rgba(255,255,255,0.05);
      font-size: 11px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0; transition: all 0.2s ease;
    }
    .option-btn:hover:not(.disabled) .option-label { background: rgba(226, 180, 77, 0.2); color: var(--gold); }
    .option-btn.correct { background: rgba(74, 222, 128, 0.1); border-color: var(--correct); box-shadow: 0 0 15px rgba(74, 222, 128, 0.1); }
    .option-btn.correct .option-label { background: var(--correct); color: var(--bg-deep); }
    .option-btn.wrong { background: rgba(248, 113, 113, 0.1); border-color: var(--wrong); box-shadow: 0 0 15px rgba(248, 113, 113, 0.1); }
    .option-btn.wrong .option-label { background: var(--wrong); color: var(--bg-deep); }
    .option-btn.disabled { cursor: default; opacity: 0.5; }
    .option-btn.correct.disabled, .option-btn.wrong.disabled { opacity: 1; }

    .explanation {
      margin-top: 8px; padding: 8px 12px; background: rgba(226, 180, 77, 0.05);
      border: 1px solid rgba(226, 180, 77, 0.15); border-radius: 8px;
      font-size: 12px; line-height: 1.5; color: var(--text-secondary); animation: fadeInUp 0.3s ease-out; display: none;
    }
    .explanation .exp-label { color: var(--gold); font-weight: 700; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; display: block; }

    .next-btn {
      display: none; margin: 8px auto 0; padding: 8px 36px;
      background: linear-gradient(135deg, rgba(226, 180, 77, 0.2), rgba(226, 180, 77, 0.1));
      border: 1px solid var(--gold); color: var(--gold-light); border-radius: 50px;
      font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.3s ease; letter-spacing: 2px;
    }
    .next-btn:hover { background: linear-gradient(135deg, rgba(226, 180, 77, 0.3), rgba(226, 180, 77, 0.15)); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(226, 180, 77, 0.2); }

    .timer-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-bottom: 6px; overflow: hidden; }
    .timer-fill { height: 100%; width: 100%; border-radius: 2px; transition: width 0.05s linear, background-color 0.5s ease; background: var(--accent-anemo); }
    .timer-fill.warning { background: var(--accent-pyro); }

    /* ===== RESULT SCREEN ===== */
    #result-screen { display: none; text-align: center; width: 100%; animation: fadeInUp 0.8s ease-out; }
    .result-card {
      background: var(--bg-card); border: 1px solid rgba(226, 180, 77, 0.15);
      border-radius: 20px; padding: 32px 28px; backdrop-filter: blur(20px); position: relative; overflow: hidden;
    }
    .result-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent-pyro), var(--gold), var(--accent-electro)); }

    .result-rank { font-size: 16px; color: var(--text-secondary); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; }
    .result-title {
      font-size: 32px; font-weight: 900;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 32px;
    }

    .result-score-circle { width: 130px; height: 130px; margin: 0 auto 20px; position: relative; display: flex; align-items: center; justify-content: center; }
    .result-score-circle svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
    .result-score-circle circle { fill: none; stroke-width: 6; }
    .circle-bg { stroke: rgba(255,255,255,0.05); }
    .circle-fill { stroke: var(--gold); stroke-linecap: round; stroke-dasharray: 439.82; stroke-dashoffset: 439.82; transition: stroke-dashoffset 1.5s ease-out; }

    .result-score-number { font-size: 36px; font-weight: 900; color: var(--gold-light); }
    .result-score-number small { font-size: 16px; color: var(--text-secondary); font-weight: 500; }

    .result-stats { display: flex; justify-content: center; gap: 40px; margin: 16px 0 24px; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-value.correct-val { color: var(--correct); }
    .stat-value.wrong-val { color: var(--wrong); }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; letter-spacing: 1px; }

    .result-message { font-size: 15px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 36px; }

    .result-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .retry-btn {
      padding: 16px 48px; background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: var(--bg-deep); border: none; border-radius: 50px; font-family: var(--font);
      font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 3px; transition: all 0.3s ease;
    }
    .retry-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(226, 180, 77, 0.4); }
    .back-btn {
      padding: 16px 36px; background: transparent;
      border: 1px solid var(--border-glow); color: var(--gold-light); border-radius: 50px;
      font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.3s ease; letter-spacing: 2px;
    }
    .back-btn:hover { background: rgba(226, 180, 77, 0.08); transform: translateY(-2px); }

    /* ===== COMBO ===== */
    .combo-badge {
      display: none; font-size: 12px; font-weight: 700; color: var(--gold);
      padding: 2px 8px; border-radius: 10px; background: rgba(226, 180, 77, 0.12);
    }
    .combo-badge.show { display: inline-block; animation: comboPop 0.3s ease-out; }
    @keyframes comboPop { 0% { transform: scale(1.4); } 100% { transform: scale(1); } }

    /* ===== STATS ===== */
    .stats-line { font-size: 12px; color: var(--text-secondary); margin-top: 8px; min-height: 18px; }
    .stats-line span { color: var(--gold); font-weight: 700; }
    .new-record {
      display: none; font-size: 14px; font-weight: 700; color: var(--gold-light);
      margin-bottom: 12px; animation: comboPop 0.4s ease-out;
    }

    /* ===== REVIEW ===== */
    .review-section {
      display: none; margin-top: 28px; padding-top: 22px; text-align: left;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .review-title {
      font-size: 12px; color: var(--gold); font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 10px; text-align: center;
    }
    .review-item {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
    }
    .review-item .rv-q { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; line-height: 1.5; }
    .review-item .rv-num {
      display: inline-block; color: var(--gold); font-size: 11px; font-weight: 700;
      background: rgba(226, 180, 77, 0.12); padding: 1px 8px; border-radius: 8px; margin-right: 7px;
    }
    .review-item .rv-a { font-size: 12px; margin-bottom: 6px; display: flex; gap: 14px; flex-wrap: wrap; }
    .review-item .rv-correct { color: var(--correct); font-weight: 600; }
    .review-item .rv-chosen { color: var(--wrong); }
    .review-item .rv-e { font-size: 11px; color: var(--text-secondary); line-height: 1.6; }

    /* ===== SETTINGS ===== */
    .settings-btn {
      position: fixed; top: 14px; right: 14px; z-index: 60;
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-secondary); font-size: 17px; cursor: pointer;
      transition: all 0.2s ease; backdrop-filter: blur(10px);
    }
    .settings-btn:hover { border-color: var(--gold); color: var(--gold); transform: rotate(30deg); }
    .settings-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(5, 8, 16, 0.7); z-index: 70;
      align-items: center; justify-content: center; padding: 20px;
    }
    .settings-card {
      background: var(--bg-card); border: 1px solid var(--border-glow);
      border-radius: 16px; padding: 26px 28px; width: 100%; max-width: 340px;
      backdrop-filter: blur(20px); animation: fadeInUp 0.25s ease-out;
    }
    .settings-title {
      font-size: 14px; color: var(--gold); font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 20px; text-align: center;
    }
    .settings-row { margin-bottom: 18px; }
    .settings-row label {
      display: flex; justify-content: space-between; font-size: 13px;
      color: var(--text-primary); margin-bottom: 8px;
    }
    .settings-row label span { color: var(--gold); font-weight: 700; }
    .settings-row input[type="range"] { width: 100%; accent-color: var(--gold); cursor: pointer; }
    .settings-close-btn {
      display: block; margin: 8px auto 0; padding: 9px 32px; background: transparent;
      border: 1px solid var(--border-glow); color: var(--gold-light); border-radius: 50px;
      font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease; letter-spacing: 2px;
    }
    .settings-close-btn:hover { background: rgba(226, 180, 77, 0.08); }

    /* ===== EXTREME WARNING ===== */
    .extreme-warning-box {
      max-width: 460px; margin: 0 auto; padding: 12px 18px;
      border: 1px solid rgba(239, 121, 56, 0.45); background: rgba(239, 121, 56, 0.08);
      border-radius: 12px; font-size: 12.5px; line-height: 1.8; color: var(--text-primary);
      animation: fadeInUp 0.3s ease-out;
    }
    .extreme-warning-box strong { color: var(--accent-pyro); }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .shake { animation: shake 0.5s ease-in-out; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 10% { transform: translateX(-12px); } 30% { transform: translateX(10px); } 50% { transform: translateX(-8px); } 70% { transform: translateX(6px); } 90% { transform: translateX(-3px); } }

    .confetti-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 100; overflow: hidden; }
    .confetti { position: absolute; width: 8px; height: 8px; top: -10px; animation: confettiFall linear forwards; }
    @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

    @media (max-width: 600px) {
      .container { padding: 16px; }
      .logo-title { font-size: 30px; }
      .question-text { font-size: 17px; }

// =======================================================================
//  GAME ENGINE
// =======================================================================
let selectedDifficulty = 'easy';
let selectedGenres = new Set(Object.keys(GENRES));
let questionCount = 10;
let questions = [];
let currentQuestion = 0;
let score = 0;
let wrongCount = 0;
let combo = 0;
let wrongAnswers = [];
let answered = false;
let timerInterval = null;


const DIFF_KEYS = ['easy', 'normal', 'hard', 'extreme'];
const TIMER_MAP = { easy: 20, normal: 15, hard: 12, extreme: 20, all: 15 };

// ── 保存データ（戦績・音量・出題履歴） ──
const STORAGE_KEY = 'genshin-quiz-save';
function loadSave() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { return {}; }
}
const saveData = loadSave();
const volumes = Object.assign({ bgm: 0.4, se: 1.0 }, saveData.volumes);
function persistSave() {
  saveData.volumes = volumes;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(saveData)); } catch (e) {}
}

// DOM
const $start   = document.getElementById('start-screen');
const $quiz    = document.getElementById('quiz-screen');
const $result  = document.getElementById('result-screen');
const $startBtn = document.getElementById('start-btn');
const $nextBtn  = document.getElementById('next-btn');
const $retryBtn = document.getElementById('retry-btn');
const $backBtn  = document.getElementById('back-btn');
const $quitBtn  = document.getElementById('quit-btn');

// ── Particles ──
(function initParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.classList.add('particle');
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    const s = (2 + Math.random() * 3) + 'px';
    p.style.width = s; p.style.height = s;
    c.appendChild(p);
  }
})();

// ── Build Genre Chips ──
(function buildGenreUI() {
  const grid = document.getElementById('genre-grid');
  // "All" chip first
  const allChip = makeChip('all', 'すべて', '');
  allChip.classList.add('active');
  grid.appendChild(allChip);

  for (const [key, { label }] of Object.entries(GENRES)) {
    const cnt = countQuestions(key, 'all');
    const chip = makeChip(key, label, cnt);
    chip.classList.add('active');
    grid.appendChild(chip);
  }

  function makeChip(key, label, count) {
    const chip = document.createElement('button');
    chip.className = 'genre-chip';
    chip.dataset.genre = key;
    chip.innerHTML = label +
      (count !== '' ? `<span class="chip-count">${count}</span>` : '');
    chip.addEventListener('click', () => toggleGenre(key));
    return chip;
  }
})();

function countQuestions(genre, diff) {
  if (genre === 'all') {
    let t = 0;
    for (const g of Object.keys(GENRES)) t += countQuestions(g, diff);
    return t;
  }
  const data = quizData[genre];
  if (!data) return 0;
  if (diff === 'all') return DIFF_KEYS.reduce((t, d) => t + (data[d]?.length || 0), 0);
  return data[diff]?.length || 0;
}

function toggleGenre(key) {
  const chips = document.querySelectorAll('.genre-chip');
  const allChip = document.querySelector('.genre-chip[data-genre="all"]');

  if (key === 'all') {
    const allActive = allChip.classList.contains('active');
    if (allActive) {
      // Deselect all
      chips.forEach(c => c.classList.remove('active'));
      selectedGenres.clear();
    } else {
      // Select all
      chips.forEach(c => c.classList.add('active'));
      selectedGenres = new Set(Object.keys(GENRES));
    }
  } else {
    const chip = document.querySelector(`.genre-chip[data-genre="${key}"]`);
    if (selectedGenres.has(key)) {
      selectedGenres.delete(key);
      chip.classList.remove('active');
      allChip.classList.remove('active');
    } else {
      selectedGenres.add(key);
      chip.classList.add('active');
      if (selectedGenres.size === Object.keys(GENRES).length) allChip.classList.add('active');
    }
  }
  updatePoolCount();
}

// ── Difficulty buttons ──
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDifficulty = btn.dataset.diff;
    updateExtremeUI();
    updatePoolCount();
  });
});

// 超上級選択時はジャンル選択を注意書きに差し替え、出題数を10問に固定する
function updateExtremeUI() {
  const isExtreme = selectedDifficulty === 'extreme';
  document.getElementById('genre-section').style.display = isExtreme ? 'none' : '';
  document.getElementById('extreme-warning').style.display = isExtreme ? 'block' : 'none';
  document.querySelectorAll('.count-btn').forEach(b => {
    const is10 = b.dataset.value === '10';
    b.style.display = (isExtreme && !is10) ? 'none' : '';
    if (isExtreme) b.classList.toggle('active', is10);
  });
  if (isExtreme) questionCount = 10;
}

// ── Question count buttons ──
(function buildCountUI() {
  const container = document.getElementById('count-options');
  const countChoices = [
    { label: '10', value: 10 },
    { label: '20', value: 20 },
    { label: '全問', value: 9999 }
  ];
  countChoices.forEach(({ label, value }) => {
    const btn = document.createElement('button');
    btn.className = 'count-btn' + (value === 10 ? ' active' : '');
    btn.dataset.value = value;
    btn.textContent = label;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      questionCount = value;
    });
    container.appendChild(btn);
  });
})();

function getPool() {
  let pool = [];
  // 超上級はジャンル選択を無視して全ジャンルから出題する
  const genres = selectedDifficulty === 'extreme' ? Object.keys(GENRES) : selectedGenres;
  for (const genre of genres) {
    const data = quizData[genre];
    if (!data) continue;
    const diffs = selectedDifficulty === 'all' ? DIFF_KEYS : [selectedDifficulty];
    for (const d of diffs) {
      if (data[d]) {
        pool.push(...data[d].map(q => ({
          ...q,
          category: GENRES[genre].label,
          difficulty: d
        })));
      }
    }
  }
  return pool;
}

function updatePoolCount() {
  const pool = getPool();
  document.getElementById('pool-count').textContent = pool.length;
  updateStartBtn();
  renderStatsLine();
  // Update chip counts
  document.querySelectorAll('.genre-chip[data-genre]').forEach(chip => {
    const g = chip.dataset.genre;
    if (g === 'all') return;
    const countSpan = chip.querySelector('.chip-count');
    if (countSpan) countSpan.textContent = countQuestions(g, selectedDifficulty);
  });
}

function updateStartBtn() {
  $startBtn.disabled = getPool().length === 0;
}

updatePoolCount();

// ── Shuffle ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── START / タイトルへ戻る ──
[$startBtn, $retryBtn].forEach(btn =>
  btn.addEventListener('click', () => { playClickSound(); startGame(); })
);

function returnToTitle() {
  playClickSound();
  clearInterval(timerInterval);
  $quiz.style.display = 'none';
  $result.style.display = 'none';
  $start.style.display = 'block';
  $start.style.animation = 'none';
  $start.offsetHeight;
  $start.style.animation = 'fadeInUp 0.5s ease-out';
  bgmEngine.setScene('title');
}
$backBtn.addEventListener('click', returnToTitle);
$quitBtn.addEventListener('click', returnToTitle);

function startGame() {
  const pool = getPool();
  const count = Math.min(questionCount, pool.length);
  if (count === 0) return;

  // 未出題の問題を優先し（直近の出題履歴を参照）、選択肢の並びもシャッフルする
  const recent = saveData.recentQ || [];
  questions = shuffle(pool)
    .sort((a, b) => recent.lastIndexOf(a.q) - recent.lastIndexOf(b.q))
    .slice(0, count)
    .map(q => {
      const order = shuffle([0, 1, 2, 3]);
      return { ...q, o: order.map(i => q.o[i]), a: order.indexOf(q.a) };
    });
  const askedKeys = questions.map(q => q.q);
  saveData.recentQ = recent.filter(k => !askedKeys.includes(k)).concat(askedKeys).slice(-80);
  persistSave();
  currentQuestion = 0;
  score = 0;
  wrongCount = 0;
  combo = 0;
  wrongAnswers = [];
  document.getElementById('combo-badge').className = 'combo-badge';
  document.getElementById('q-total').textContent = questions.length;

  $start.style.display = 'none';
  $quiz.style.display = 'block';
  $result.style.display = 'none';
  bgmEngine.setScene('quiz');

  showQuestion();
}

// ── SHOW QUESTION ──
function showQuestion() {
  answered = false;
  const q = questions[currentQuestion];

  document.getElementById('q-current').textContent = currentQuestion + 1;
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress-fill').style.width = ((currentQuestion) / questions.length * 100) + '%';
  document.getElementById('tally-correct').textContent = score;
  document.getElementById('tally-wrong').textContent = wrongCount;

  // Difficulty badge
  const badge = document.getElementById('q-diff-badge');
  const diffLabels = { easy: '初級', normal: '中級', hard: '上級', extreme: '超上級' };
  badge.textContent = diffLabels[q.difficulty] || '';
  badge.className = 'question-difficulty-badge badge-' + q.difficulty;

  document.getElementById('explanation').style.display = 'none';
  $nextBtn.style.display = 'none';

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeInUp 0.5s ease-out';

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];

  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span class="option-text">${opt}</span>`;
    btn.style.animation = `fadeInUp ${0.3 + i * 0.08}s ease-out`;
    btn.addEventListener('click', () => selectAnswer(i, btn));
    container.appendChild(btn);
  });

  startTimer();
}

// ── TIMER ──
function startTimer() {
  clearInterval(timerInterval);
  const duration = TIMER_MAP[selectedDifficulty] || 15;
  let timeLeft = duration;
  const timerFill = document.getElementById('timer-fill');
  timerFill.style.width = '100%';
  timerFill.classList.remove('warning');

  timerInterval = setInterval(() => {
    timeLeft -= 0.05;
    timerFill.style.width = Math.max(0, (timeLeft / duration) * 100) + '%';
    if (timeLeft <= duration * 0.3) timerFill.classList.add('warning');
    if (timeLeft <= 0) { clearInterval(timerInterval); if (!answered) timeUp(); }
  }, 50);
}

function timeUp() {
  revealAnswer(null);
}

// 回答確定の共通処理（selectedIndex: 選択した選択肢の番号 / null = 時間切れ）
function revealAnswer(selectedIndex) {
  answered = true;
  clearInterval(timerInterval);
  const q = questions[currentQuestion];
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.classList.add('disabled');
    if (i === q.a) b.classList.add('correct');
  });

  if (selectedIndex === q.a) {
    score++;
    combo++;
    document.getElementById('tally-correct').textContent = score;
    playCorrectSound();
    flashScreen('correct-flash');
  } else {
    wrongCount++;
    combo = 0;
    wrongAnswers.push({
      n: currentQuestion + 1,
      q: q.q,
      correct: q.o[q.a],
      chosen: selectedIndex === null ? '時間切れ' : q.o[selectedIndex],
      e: q.e,
    });
    document.getElementById('tally-wrong').textContent = wrongCount;
    playWrongSound();
    flashScreen('wrong-flash');
    const card = document.getElementById('question-card');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 500);
  }

  const comboBadge = document.getElementById('combo-badge');
  if (combo >= 2) {
    comboBadge.textContent = '🔥 ' + combo + ' COMBO';
    comboBadge.className = 'combo-badge';
    comboBadge.offsetHeight;
    comboBadge.className = 'combo-badge show';
  } else {
    comboBadge.className = 'combo-badge';
  }

  showExplanation(q.e);
  $nextBtn.style.display = 'block';
  $nextBtn.textContent = currentQuestion < questions.length - 1 ? '次の問題 →' : '結果を見る →';
  $nextBtn.style.animation = 'fadeInUp 0.4s ease-out';
}

// ── SOUND SYSTEM (Web Audio API) ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playCorrectSound() {
  if (volumes.se <= 0) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const notes = [523.25, 659.25, 783.99];
  if (combo >= 5) notes.push(1318.51); // 5コンボ以上でキラッと一音追加
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.18 * volumes.se, now + i * 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.4);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now + i * 0.1);
    osc.stop(now + i * 0.1 + 0.4);
  });
}

function playWrongSound() {
  if (volumes.se <= 0) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(200, now);
  osc.frequency.linearRampToValueAtTime(120, now + 0.35);
  gain.gain.setValueAtTime(0.15 * volumes.se, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  osc.connect(gain).connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.4);
}

function playClickSound() {
  if (volumes.se <= 0) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 880;
  gain.gain.setValueAtTime(0.08 * volumes.se, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  osc.connect(gain).connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.08);
}

function playFanfare() {
  if (volumes.se <= 0) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15 * volumes.se, now + i * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.6);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now + i * 0.15);
    osc.stop(now + i * 0.15 + 0.6);
  });
}

// ── BGM（Web Audioによる自動生成・原神風アンビエント） ──
const bgmEngine = {
  gainNode: null, timer: null, scene: 'title', step: 0, nextNoteTime: 0,
  // Dメジャーペンタトニック（穏やかなファンタジー調）
  SCALE: [293.66, 329.63, 369.99, 440.00, 493.88, 587.33, 659.25, 739.99, 880.00],
  CHORDS: [
    [146.83, 220.00, 293.66, 369.99],  // D
    [123.47, 185.00, 246.94, 293.66],  // Bm
    [98.00, 146.83, 196.00, 246.94],   // G
    [110.00, 164.81, 220.00, 277.18],  // A
  ],
  CFG: {
    title:  { bpm: 62, density: 0.40, high: 0 },
    quiz:   { bpm: 84, density: 0.60, high: 0 },
    result: { bpm: 72, density: 0.65, high: 1 },
  },
  setScene(scene) { this.scene = scene; this.ensure(); },
  ensure() {
    if (volumes.bgm <= 0) { this.stop(); return; }
    if (this.timer || !audioCtx) return; // AudioContextは初回のユーザー操作後に生成される
    this.startLoop();
  },
  startLoop() {
    const ctx = getAudioCtx();
    if (!this.gainNode) { this.gainNode = ctx.createGain(); this.gainNode.connect(ctx.destination); }
    this.gainNode.gain.value = volumes.bgm * 0.5;
    this.nextNoteTime = ctx.currentTime + 0.1;
    this.step = 0;
    this.timer = setInterval(() => this.schedule(), 120);
  },
  stop() { if (this.timer) { clearInterval(this.timer); this.timer = null; } },
  setVolume() {
    if (this.gainNode) this.gainNode.gain.value = volumes.bgm * 0.5;
    if (volumes.bgm <= 0) this.stop();
    else if (!this.timer && audioCtx) this.startLoop();
  },
  schedule() {
    const ctx = getAudioCtx();
    const cfg = this.CFG[this.scene] || this.CFG.title;
    const beat = 60 / cfg.bpm / 2; // 8分音符
    // バックグラウンドでタイマーが間引かれた後は、過去分を演奏せず現在時刻まで進める
    if (this.nextNoteTime < ctx.currentTime - 0.05) this.nextNoteTime = ctx.currentTime + 0.05;
    while (this.nextNoteTime < ctx.currentTime + 0.35) {
      const bar = Math.floor(this.step / 8) % this.CHORDS.length;
      if (this.step % 8 === 0) this.pad(this.CHORDS[bar], this.nextNoteTime, beat * 8);
      if (Math.random() < cfg.density) {
        let idx = Math.floor(Math.random() * this.SCALE.length);
        if (cfg.high && idx < 4) idx += 4;
        this.pluck(this.SCALE[idx], this.nextNoteTime);
      }
      this.step++;
      this.nextNoteTime += beat;
    }
  },
  pad(freqs, t, dur) {
    const ctx = getAudioCtx();
    freqs.forEach(f => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.05, t + dur * 0.3);
      g.gain.linearRampToValueAtTime(0.0001, t + dur);
      osc.connect(g).connect(this.gainNode);
      osc.start(t); osc.stop(t + dur);
    });
  },
  pluck(f, t) {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'triangle'; osc.frequency.value = f;
    g.gain.setValueAtTime(0.07, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
    osc.connect(g).connect(this.gainNode);
    osc.start(t); osc.stop(t + 0.6);
  },
};

// ── SCREEN FLASH ──
function flashScreen(type) {
  const el = document.getElementById('screen-flash');
  el.className = 'screen-flash ' + type;
  setTimeout(() => { el.className = 'screen-flash'; }, 350);
}

// ── SELECT ANSWER ──
function selectAnswer(index, btn) {
  if (answered) return;
  if (index === questions[currentQuestion].a) spawnMiniConfetti(btn);
  else btn.classList.add('wrong');
  revealAnswer(index);
}

function showExplanation(text) {
  const exp = document.getElementById('explanation');
  document.getElementById('exp-text').textContent = text;
  exp.style.display = 'block';
}

// ── NEXT ──
$nextBtn.addEventListener('click', () => {
  playClickSound();
  currentQuestion++;
  if (currentQuestion < questions.length) showQuestion();
  else showResult();
});

// ── RESULT ──
function showResult() {
  clearInterval(timerInterval);
  $quiz.style.display = 'none';
  $result.style.display = 'block';
  $result.style.animation = 'fadeInUp 0.8s ease-out';

  const total = questions.length;
  const pct = score / total;

  document.getElementById('result-score').textContent = score;
  document.getElementById('result-total').textContent = total;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = wrongCount;

  // Reset circle then animate
  const circle = document.getElementById('circle-fill');
  const circumference = 2 * Math.PI * 70;
  circle.style.transition = 'none';
  circle.style.strokeDashoffset = circumference;
  circle.offsetHeight;
  circle.style.transition = 'stroke-dashoffset 1.5s ease-out';
  setTimeout(() => { circle.style.strokeDashoffset = circumference - (pct * circumference); }, 100);

  let rank, title, message;
  if (pct === 1) {
    rank = 'SSS'; title = '全知全能の旅人';
    message = '完璧！テイワットのすべてを知り尽くしています。あなたは真の冒険者です！';
    spawnConfetti(); playFanfare();
  } else if (pct >= 0.8) {
    rank = 'S'; title = '博識な冒険者';
    message = '素晴らしい知識量です！もう少しで完璧ですね。';
    spawnConfetti(); playFanfare();
  } else if (pct >= 0.6) {
    rank = 'A'; title = '熟練の旅人';
    message = '良い結果です！まだまだテイワットには発見が待っています。';
  } else if (pct >= 0.4) {
    rank = 'B'; title = '成長中の冒険者';
    message = 'もう少し冒険を続ければ、もっと多くのことを知れるでしょう。';
  } else {
    rank = 'C'; title = '駆け出しの旅人';
    message = 'まだ旅は始まったばかり。テイワットを探索してもう一度挑戦しましょう！';
  }

  document.getElementById('result-rank').textContent = rank;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-message').textContent = message;

  bgmEngine.setScene('result');

  // 戦績の更新（難易度別）
  saveData.stats = saveData.stats || {};
  const st = saveData.stats[selectedDifficulty] || { best: null, plays: 0, correct: 0, answered: 0 };
  st.plays++;
  st.correct += score;
  st.answered += total;
  let newRecord = false;
  if (!st.best || pct > st.best.score / st.best.total) {
    newRecord = st.plays > 1;
    st.best = { score, total };
  }
  saveData.stats[selectedDifficulty] = st;
  persistSave();
  renderStatsLine();
  document.getElementById('new-record').style.display = newRecord ? 'block' : 'none';

  // 間違えた問題の復習リスト
  const review = document.getElementById('review-section');
  if (wrongAnswers.length) {
    review.style.display = 'block';
    review.innerHTML = '<p class="review-title">間違えた問題をおさらい</p>' + wrongAnswers.map(w =>
      '<div class="review-item">' +
        '<p class="rv-q"><span class="rv-num">Q.' + w.n + '</span>' + w.q + '</p>' +
        '<p class="rv-a"><span class="rv-correct">正解: ' + w.correct + '</span><span class="rv-chosen">あなた: ' + w.chosen + '</span></p>' +
        '<p class="rv-e">' + w.e + '</p>' +
      '</div>').join('');
  } else {
    review.style.display = 'none';
  }
}

function renderStatsLine() {
  const el = document.getElementById('stats-line');
  const st = saveData.stats && saveData.stats[selectedDifficulty];
  if (!st || !st.plays) { el.textContent = ''; return; }
  const pct = Math.round(st.correct / st.answered * 100);
  el.innerHTML = '自己ベスト <span>' + st.best.score + '/' + st.best.total + '</span> ｜ プレイ <span>' + st.plays + '</span>回 ｜ 累計正答率 <span>' + pct + '%</span>';
}

// ── CONFETTI ──
function spawnConfetti() {
  const c = document.createElement('div');
  c.className = 'confetti-container';
  document.body.appendChild(c);
  const colors = ['#e2b44d','#f5d88e','#74c2a8','#b08fc2','#ef7938','#4cc2f1','#f87171','#4ade80'];
  for (let i = 0; i < 100; i++) {
    const p = document.createElement('div');
    p.className = 'confetti';
    p.style.left = Math.random()*100+'%';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (2+Math.random()*3)+'s';
    p.style.animationDelay = Math.random()*1.5+'s';
    const s = (4+Math.random()*8)+'px'; p.style.width = s; p.style.height = s;
    p.style.borderRadius = Math.random()>0.5?'50%':'2px';
    c.appendChild(p);
  }
  setTimeout(() => c.remove(), 5000);
}

function spawnMiniConfetti(btn) {
  const rect = btn.getBoundingClientRect();
  const c = document.createElement('div');
  c.className = 'confetti-container';
  document.body.appendChild(c);
  const colors = ['#4ade80','#e2b44d','#f5d88e'];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'confetti';
    p.style.left = (rect.left+rect.width/2+(Math.random()-0.5)*100)+'px';
    p.style.top = rect.top+'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (1+Math.random()*1.5)+'s';
    const s = (3+Math.random()*5)+'px'; p.style.width = s; p.style.height = s;
    p.style.borderRadius = '50%';
    c.appendChild(p);
  }
  setTimeout(() => c.remove(), 3000);
}

// ── キーボード操作（1〜4で回答 / Enter・Spaceで次へ） ──
document.addEventListener('keydown', (e) => {
  if (document.getElementById('settings-overlay').style.display === 'flex') {
    if (e.key === 'Escape') closeSettings();
    return;
  }
  if ($quiz.style.display !== 'block') return;
  if (!answered && ['1', '2', '3', '4'].includes(e.key)) {
    const btn = document.querySelectorAll('.option-btn')[Number(e.key) - 1];
    if (btn) btn.click();
  } else if (answered && (e.key === 'Enter' || e.key === ' ')) {
    e.preventDefault();
    $nextBtn.click();
  }
});

// ── 設定パネル（音量調整） ──
const $bgmVol = document.getElementById('bgm-vol');
const $seVol = document.getElementById('se-vol');
function renderVolumeUI() {
  $bgmVol.value = Math.round(volumes.bgm * 100);
  $seVol.value = Math.round(volumes.se * 100);
  document.getElementById('bgm-vol-label').textContent = $bgmVol.value + '%';
  document.getElementById('se-vol-label').textContent = $seVol.value + '%';
}
function closeSettings() {
  document.getElementById('settings-overlay').style.display = 'none';
}
document.getElementById('settings-btn').addEventListener('click', () => {
  renderVolumeUI();
  document.getElementById('settings-overlay').style.display = 'flex';
});
document.getElementById('settings-close').addEventListener('click', () => { playClickSound(); closeSettings(); });
document.getElementById('settings-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'settings-overlay') closeSettings();
});
$bgmVol.addEventListener('input', () => {
  volumes.bgm = $bgmVol.value / 100;
  renderVolumeUI();
  bgmEngine.setVolume();
  persistSave();
});
$seVol.addEventListener('input', () => {
  volumes.se = $seVol.value / 100;
  renderVolumeUI();
  persistSave();
});
$seVol.addEventListener('change', () => playClickSound());

// ── 初回のユーザー操作（クリックまたはキー入力）でオーディオ開始（ブラウザの自動再生制限対策） ──
function initAudioOnce() {
  document.removeEventListener('pointerdown', initAudioOnce);
  document.removeEventListener('keydown', initAudioOnce);
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  bgmEngine.ensure();
}
document.addEventListener('pointerdown', initAudioOnce);
document.addEventListener('keydown', initAudioOnce);
</script>
